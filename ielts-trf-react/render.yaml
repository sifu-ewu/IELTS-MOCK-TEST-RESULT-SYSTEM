services:
  - type: web
    name: ielts-trf-generator
    runtime: node
    plan: free
    # Build step: install deps (downloads bundled Chromium) then build the
    # React frontend into dist/. Render caches node_modules + puppeteer cache
    # between deploys, so subsequent builds are fast.
    buildCommand: npm install && npm run build
    startCommand: node server/server.js
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20.19.6
      # Keep Puppeteer's Chromium in the project directory so it's included
      # in Render's build cache instead of a user home dir that may not
      # persist between deploys.
      - key: PUPPETEER_CACHE_DIR
        value: /opt/render/project/src/.cache/puppeteer
      # Default to production mode; Express will then serve the built
      # frontend from dist/ on the same port as the API.
      - key: NODE_ENV
        value: production
