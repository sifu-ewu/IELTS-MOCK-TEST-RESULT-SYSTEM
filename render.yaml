services:
  - type: web
    name: ielts-trf-generator
    runtime: node
    plan: free
    # The app lives in a subfolder of the repo; Render cd's into it for
    # install, build, and start.
    rootDir: ielts-trf-react
    # --include=dev forces devDependencies (vite, @vitejs/plugin-react) to
    # install even though NODE_ENV=production is set. Needed for `vite build`.
    # The explicit `npx puppeteer browsers install chrome` forces Chromium
    # to download into PUPPETEER_CACHE_DIR regardless of whether npm's
    # cache thinks puppeteer is already installed (prevents a stale build
    # cache from skipping the download).
    buildCommand: npm install --include=dev && npx puppeteer browsers install chrome && npm run build
    startCommand: node server/server.js
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20.19.6
      - key: NODE_ENV
        value: production
      # Keep Chromium inside /opt/render/project/src/... because Render only
      # persists that tree between build and runtime. The default ~/.cache
      # path lives outside it and gets wiped, causing the runtime to fail
      # with "Could not find Chrome".
      - key: PUPPETEER_CACHE_DIR
        value: /opt/render/project/src/ielts-trf-react/.puppeteer-cache
